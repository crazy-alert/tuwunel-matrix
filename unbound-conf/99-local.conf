server:
    # Оптимизация для кэширования
    cache-min-ttl: 3600
    cache-max-ttl: 86400
    # Включить предварительную выборку (обновляет популярные записи до истечения TTL)
    prefetch: yes
    prefetch-key: yes
    # Размер кэша (подберите под свой сервер)
    msg-cache-size: 100m
    rrset-cache-size: 200m
    # Логи (опционально)
    verbosity: 1
    # Для России: можно форвардеры для зон .ru, если рекурсия тормозит
    forward-zone:
        name: "."
        forward-addr: 1.1.1.1@853#cloudflare-dns.com   # DNS-over-TLS
        forward-addr: 8.8.8.8@853