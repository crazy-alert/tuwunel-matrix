services:
  postgres:
    image: postgres:16-alpine
    container_name: tuwunel-db
    restart: unless-stopped
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  tuwunel:
    image: ghcr.io/matrix-construct/tuwunel:latest
    container_name: tuwunel
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./tuwunel-data:/var/lib/tuwunel
    networks:
      - internal
    dns:
      - ${UNBOUND_IP}
    environment:
      - TUWUNEL_CONFIG=/dev/null
      - TUWUNEL_SERVER_NAME=${SERVER_NAME}
      - TUWUNEL_DATABASE__BACKEND=postgres
      - TUWUNEL_DATABASE__URI=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - TUWUNEL_GLOBAL__ADDRESS=${TUWUNEL_ADDRESS}
      - TUWUNEL_GLOBAL__MEDIA_DIRECTORY=/var/lib/tuwunel/media
      - TUWUNEL_REGISTRATION__ENABLED=${TUWUNEL_REGISTRATION_ENABLED}
      - TUWUNEL_REGISTRATION__TOKEN=${TUWUNEL_REGISTRATION_TOKEN}
      - TUWUNEL_TLS__ENABLED=false
    command:
      - -c
      - /dev/null
      - -O
      - "global.address=0.0.0.0:8008"

  caddy:
    image: caddy:2-alpine
    container_name: tuwunel-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8448:8448"
    env_file: .env
    volumes:
      - caddy_data:/data
      - ./caddy-config:/etc/caddy
    networks:
      - internal
    depends_on:
      - tuwunel
    dns:
      - ${UNBOUND_IP}


  unbound:
    image: ghcr.io/rafaelperoco/unbound:latest
    container_name: tuwunel-unbound
    restart: unless-stopped
    networks:
      internal:
        ipv4_address: ${UNBOUND_IP}
    volumes:
      - ./unbound-conf:/etc/unbound/conf.d:ro
      - ./unbound_data:/var/lib/unbound
    expose:
      - "53/udp"
      - "53/tcp"
    healthcheck:
      test: [ "CMD", "unbound-control", "status" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET}

volumes:
  caddy_data: